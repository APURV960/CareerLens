services:
  - type: web
    name: careerlens
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_ID
        sync: false
      - key: APP_KEY
        sync: false
      - key: STORAGE_PROVIDER
        value: local
      - key: JWT_SECRET
        generateValue: true
